services:
  mongo:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - rag_mongodb_storage:/data/db

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - rag_qdrant_storage:/qdrant/storage

  rag:
    build:
      context: .
    image: rag-prototype:local
    env_file:
      - .env.docker
    depends_on:
      - mongo
      - qdrant
    volumes:
      - ./docs:/app/docs:ro
      - ./outputs:/app/outputs
      - rag_hf_cache:/cache
    command: ["tail", "-f", "/dev/null"]

volumes:
  rag_mongodb_storage:
  rag_qdrant_storage:
  rag_hf_cache:
